<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checklist Vacances</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="home">

  <h1>🌺 Checklist Vacances</h1>

  <div class="grid">

    <div class="card" onclick="openCategory('valise')">🧳 Valise</div>
    <div class="card" onclick="openCategory('tente')">⛺ Tente</div>
    <div class="card" onclick="openCategory('alimentaire')">🍓 Alimentaire</div>
    <div class="card" onclick="openCategory('divers')">🎒 Divers</div>

  </div>

</div>

<!-- CATEGORY -->
<div id="category" class="hidden">

  <button onclick="goHome()">← Retour</button>
  <h2 id="title"></h2>

  <div id="subcats"></div>

  <div id="list"></div>

  <div class="addBox">
    <input id="newItem" placeholder="Ajouter un élément">
    <button onclick="addItem()">+</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
