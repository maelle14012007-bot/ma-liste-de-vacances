<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌺 Ma liste de vacances</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ==========================
ACCUEIL
========================== -->

<div id="homePage">

<header>

<h1>🌺 Ma liste de vacances</h1>

<p>Prépare tes vacances sans rien oublier 🌴☀️</p>

</header>

<div class="grid">

<div class="card" onclick="openCategory('valise')">
<div class="emoji">🧳</div>
<h2>Valise</h2>
<p>Vêtements • Toilette • Électronique</p>
</div>

<div class="card" onclick="openCategory('tente')">
<div class="emoji">⛺</div>
<h2>Tente</h2>
<p>Camping</p>
</div>

<div class="card" onclick="openCategory('alimentaire')">
<div class="emoji">🍓</div>
<h2>Alimentaire</h2>
<p>Nourriture</p>
</div>

<div class="card" onclick="openCategory('divers')">
<div class="emoji">🎒</div>
<h2>Divers</h2>
<p>Documents & accessoires</p>
</div>

</div>

</div>

<!-- ==========================
PAGE CATÉGORIE
========================== -->

<div id="categoryPage" class="hidden">

<button class="back" onclick="goHome()">

← Retour

</button>

<h2 id="categoryTitle"></h2>

<div id="categoryContent"></div>

</div>

<!-- ==========================
PAGE CHECKLIST
========================== -->

<div id="listPage" class="hidden">

<button class="back" onclick="backToCategory()">

← Retour

</button>

<h2 id="listTitle"></h2>

<div id="checklist"></div>

<div class="addBox">

<input
type="text"
id="newItem"
placeholder="Ajouter un objet">

<button onclick="addItem()">

Ajouter

</button>

</div>

</div>
<!-- ==========================
BARRE DE PROGRESSION
========================== -->

<div id="progressContainer">

    <div id="progressBar"></div>

</div>

<p id="progressText">

0 % terminé

</p>

<!-- ==========================
CONFETTIS
========================== -->

<div id="confetti" class="hidden">

🎉🎉🎉

</div>

<script src="script.js"></script>

</body>

</html>
