<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ma liste de vacances</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<header>
  <h1>🌺 Ma liste de vacances 🌺</h1>
  <p>Prépare tes vacances tranquillement ☀️</p>

  <button onclick="toggleDark()">🌙 Mode</button>

  <div id="globalProgress">
    <div id="bar"></div>
  </div>
  <p id="progressText"></p>
</header>

<main>

  <div class="card" onclick="openCategory('valise')">
    🧳 <h2>Valise</h2>
    <p>Vêtements • Toilette • Premiers secours</p>
  </div>

  <div class="card" onclick="openCategory('tente')">
    ⛺ <h2>Tente</h2>
    <p>Camping</p>
  </div>

  <div class="card" onclick="openCategory('alimentaire')">
    🍓 <h2>Alimentaire</h2>
    <p>Nourriture</p>
  </div>

  <div class="card" onclick="openCategory('divers')">
    🐚 <h2>Divers</h2>
    <p>Autres</p>
  </div>

</main>

<!-- PAGE -->
<div id="page" class="hidden">
  <button onclick="closePage()">← Retour</button>
  <h2 id="title"></h2>
  <div id="list"></div>
</div>

<script src="script.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
</script>

</body>
</html>
