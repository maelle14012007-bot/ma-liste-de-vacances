<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ma liste de vacances</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🌺 Ma liste de vacances 🌺</h1>

  <div id="progressText"></div>
  <div id="barContainer">
    <div id="bar"></div>
  </div>

  <button onclick="toggleDark()">🌙</button>
</header>

<main>
  <div class="card" onclick="openCategory('valise')">🧳 Valise</div>
  <div class="card" onclick="openCategory('tente')">⛺ Tente</div>
  <div class="card" onclick="openCategory('alimentaire')">🍓 Alimentaire</div>
  <div class="card" onclick="openCategory('divers')">🐚 Divers</div>
</main>

<div id="page" class="hidden">
  <button onclick="closePage()">← Retour</button>
  <h2 id="title"></h2>
  <div id="list"></div>
</div>

<script src="script.js"></script>

</body>
</html>
